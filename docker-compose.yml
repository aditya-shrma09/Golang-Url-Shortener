services:
  app:
    build: .
    container_name: urlshortener-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: always

  postgres:
    image: postgres:16
    container_name: postgres-db
    env_file:
      - .env
    ports:
      - "5432:5432"   
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata: